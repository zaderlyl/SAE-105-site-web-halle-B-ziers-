    <script src="./entree_droite.js"></script>

</head>

                        <img src="./images/logo.png" alt="Logo Halles de Béziers" class="logo">
                    </a>
                    <a href="./index.html" class="menu__title">Halles de Béziers</a>

                <ul class="menu__nav">
                    <li>
                        <a href="./visite.html" class="menu__link">Visite</a>

        <!-- menu tel -->


                <div class="menu__mobile__brand">
                    <div class="ligne"></div>
                    <div class="ligne"></div>
                    <div class="ligne"></div>
                </div>
            </nav>
        </header>
    <!-- menu sidebar -->
    <div class="mobile__menu" id="mobileMenu">
        <button class="mobile__menu__close" id="closeMenu" aria-label="Fermer le menu">×</button>
        <nav class="mobile__menu__nav">
            <a href="./visite.html" class="mobile__menu__link">Visite</a>
            <a href="./about.html" class="mobile__menu__link">À Propos</a>

        </nav>
    </div>
    <div class="mobile__menu__overlay" id="menuOverlay"></div>
    
    <!-- SCÈNE 360 -->

    <a-scene cursor="rayOrigin: mouse;">
        <!-- CAMERA -->

        <a-camera
        wasd-controls-enabled="false"
        look-controls>
        </a-camera>

        <a-sky src="./images/photo/photo_36/entree_droite.jpg"></a-sky>

        <!-- droite -->

        <a-sphere
        class="entree"
        position="-30 5 26.62"
        radius="1"
        color="#C70000"
        animation__enter_color="property: material.color; type: color; to: #00FA43; dur: 300; startEvents: mouseenter"
        animation__leave_color="property: material.color; type: color; to: #C70000; dur: 300; startEvents: mouseleave"
        animation__enter_scale="property: scale; to: 1.7 1.7 1.7; dur: 300; startEvents: mouseenter"
        animation__leave_scale="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave"
        onclick="window.location.href='./visite.html'">
        </a-sphere>

    <!-- gauche -->

        <a-sphere
        class="gauche"
        position="0 10 -200"
        radius="3"
        color="#C70000"
        animation__enter_color="property: material.color; type: color; to: #00FA43; dur: 300; startEvents: mouseenter"
        animation__leave_color="property: material.color; type: color; to: #C70000; dur: 300; startEvents: mouseleave"
        animation__enter_scale="property: scale; to: 1.7 1.7 1.7; dur: 300; startEvents: mouseenter"
        animation__leave_scale="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave"
        onclick="window.open('https://www.ville-beziers.fr/a-decouvrir/patrimoine/cathedrale-saint-nazaire', '_blank')"> 
        </a-sphere>

        <!-- arriere -->

        <a-sphere
        class="arriere"
        position="20 7 20"
        radius="0.5"
        color="#C70000"
        animation__enter_color="property: material.color; type: color; to: #00FA43; dur: 300; startEvents: mouseenter"
        animation__leave_color="property: material.color; type: color; to: #C70000; dur: 300; startEvents: mouseleave"
        animation__enter_scale="property: scale; to: 1.7 1.7 1.7; dur: 300; startEvents: mouseenter"
        animation__leave_scale="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave"
        onclick="window.location.href='./3D/entree/entree.html'"> 
        </a-sphere>

        <!-- Sortie cathe -->

        <a-entity class="1"
        position="-25 0 20"
        rotation="0 130 0"
        text="value: Entree dans les Halles; width: 45; align: center; color: #BBB">
        </a-entity>

        <!-- Sortie centreville -->

        <a-entity class="2"
        position="0  0.57 -15"
        rotation="0 0 0"
        text="value: En direction de la cathedrale-saint-nazaire; width: 18; align: center; color: #BBB">
        </a-entity>


        <!-- entree serre -->


        <a-entity class="3"
        position="30 0 30"
        rotation="0 230 0"
        text="value: Autre entree; width: 40; align: center; color: #BBB">
        </a-entity>

    </a-scene>



    </body>
</html>
