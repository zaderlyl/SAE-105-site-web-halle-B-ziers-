</head>

    <!-- menu sidebar -->

        <button class="mobile__menu__close" id="closeMenu" aria-label="Fermer le menu">×</button>
        <nav class="mobile__menu__nav">

    <div class="mobile__menu__overlay" id="menuOverlay"></div>
    
    <!-- SCÈNE 360 -->

    <a-scene cursor="rayOrigin: mouse;">
        <!-- CAMERA -->

        <a-camera
        wasd-controls-enabled="false"
        look-controls>
        </a-camera>

        <a-sky src="./images/photo/photo_36/centre_droite.jpg"></a-sky>

        <!-- derriere -->

        <a-sphere
        position="-10 5 26.62"
        radius="0.5"
        color="#C70000"
        animation__enter_color="property: material.color; type: color; to: #00FA43; dur: 300; startEvents: mouseenter"
        animation__leave_color="property: material.color; type: color; to: #C70000; dur: 300; startEvents: mouseleave"
        animation__enter_scale="property: scale; to: 1.7 1.7 1.7; dur: 300; startEvents: mouseenter"
        animation__leave_scale="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave"
        onclick="window.location.href=''">
        </a-sphere>

    <!-- Sortie gauche -->

        <a-sphere
        class="centre"
        position="-60 5 -30"
        radius="1.5"
        color="#C70000"
        animation__enter_color="property: material.color; type: color; to: #00FA43; dur: 300; startEvents: mouseenter"
        animation__leave_color="property: material.color; type: color; to: #C70000; dur: 300; startEvents: mouseleave"
        animation__enter_scale="property: scale; to: 1.7 1.7 1.7; dur: 300; startEvents: mouseenter"
        animation__leave_scale="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave"
        onclick="window.location.href='./3D/centre/centre.html'">
        </a-sphere>

        <!-- droite -->

        <a-sphere
        class="centre_droite_droite"
        position="50 3 -5"
        radius="1"
        color="#C70000"
        animation__enter_color="property: material.color; type: color; to: #00FA43; dur: 300; startEvents: mouseenter"
        animation__leave_color="property: material.color; type: color; to: #C70000; dur: 300; startEvents: mouseleave"
        animation__enter_scale="property: scale; to: 1.7 1.7 1.7; dur: 300; startEvents: mouseenter"
        animation__leave_scale="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave"
        onclick="window.location.href='./3D/centre_droite_droite/centre_droite_droite.html'">
        </a-sphere>

        <!-- derriere -->

        <a-entity class="1"
        position="-15 0 40"
        rotation="0 160 0"
        text="value: Aller derriere; width: 30; align: center; color: #FEEBE7">
        </a-entity>

        <!-- gauche -->

        <a-entity class="2"
        position="-20 0.57 -10"
        rotation="0 60 0"
        text="value: Aller a gauche ; width: 22; align: center; color: #FEEBE7">
        </a-entity>


        <!-- droite -->


        <a-entity class="3"
        position="60 0 -5"
        rotation="0 280 0"
        text="value: Aller a droite; width: 40; align: center; color: #FEEBE7">
        </a-entity>

    </a-scene>



    </body>
</html>
