    <!-- SCÈNE 360 -->

    <a-scene cursor="rayOrigin: mouse;">
        <!-- CAMERA -->

        <a-camera
        wasd-controls-enabled="false"
        look-controls>
        </a-camera>

        <a-sky src="./images/photo/photo_36/fond_gauche.jpg"></a-sky>

        <!-- Sortie devant -->

        <a-sphere
        class="centre"
        position="-60 10 26.62"
        radius="1.5"
        color="#C70000"
        animation__enter_color="property: material.color; type: color; to: #00FA43; dur: 300; startEvents: mouseenter"
        animation__leave_color="property: material.color; type: color; to: #C70000; dur: 300; startEvents: mouseleave"
        animation__enter_scale="property: scale; to: 1.7 1.7 1.7; dur: 300; startEvents: mouseenter"
        animation__leave_scale="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave"
        onclick="window.location.href='./3D/centre_gauche/centre_gauche.html'">
        </a-sphere>

 
        <!-- entree droite -->

        <a-sphere
        class="fond_droite"
        position="10 3 20"
        radius="0.5"
        color="#C70000"
        animation__enter_color="property: material.color; type: color; to: #00FA43; dur: 300; startEvents: mouseenter"
        animation__leave_color="property: material.color; type: color; to: #C70000; dur: 300; startEvents: mouseleave"
        animation__enter_scale="property: scale; to: 1.7 1.7 1.7; dur: 300; startEvents: mouseenter"
        animation__leave_scale="property: scale; to: 1 1 1; dur: 300; startEvents: mouseleave"
        onclick="window.location.href='./3D/fond/fond.html'">
        </a-sphere>

        <!-- Sortie cathe -->

        <a-entity class="1"
        position="-50 0 20"
        rotation="0 130 0"
        text="value:Revenir en arriere; width: 45; align: center; color: #BBB">
        </a-entity>

        <!-- Sortie centreville --> 
        <!-- entree serre -->


        <a-entity class="3"
        position="15 0 30"
        rotation="0 200 0"
        text="value: Aller a droite; width: 30; align: center; color: #BBB">
        </a-entity>

    </a-scene>



    </body>
</html>
